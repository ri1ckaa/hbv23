<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Финальный сюрприз 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #ffe0f0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        .heart {
            position: fixed;
            bottom: 0;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1;
            animation: floatHeart linear infinite;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.9;
            }
            50% {
                transform: translateY(-50vh) translateX(10px);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-100vh) translateX(20px);
                opacity: 0;
            }
        }

        .content {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            text-align: center;
            background: rgba(255, 245, 250, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 1rem 1.5rem 1.8rem 1.5rem;
            box-shadow: 0 10px 25px rgba(255, 80, 120, 0.2);
        }

        .main-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #c2185b;
            margin-bottom: 2.0rem;
            white-space: nowrap;
        }

        .polaroid {
            background: white;
            padding: 12px 12px 20px 12px;
            display: inline-block;
            margin-bottom: 1rem;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 0 25px 12px rgba(194, 24, 91, 0.4), 0 10px 20px rgba(0,0,0,0.2);
        }

        .photo-container {
            width: 280px;
            height: 375px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 4px;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .polaroid-caption {
            font-size: 0.95rem;
            color: #1a1a1a;
            margin-top: 12px;
            text-align: center;
            width: 280px;
            line-height: 1.4;
        }

        .black-text {
            font-size: 1.2rem;
            color: #1a1a1a;
            font-weight: bold;
            margin: 1.5rem 0;
        }

        .next-btn {
            background: #c2185b;
            border: none;
            padding: 12px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7b0f3a;
            transition: 0.07s linear;
            font-family: 'Comic Sans MS', 'cursive', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 0.5rem;
        }
        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7b0f3a;
        }

        /* Медиа-запрос для телефонов — рамка длиннее */
        @media (max-width: 550px) {
            .main-title {
                font-size: 0.95rem;
                white-space: nowrap;
                margin-bottom: 1.5rem;
            }
            .photo-container {
                width: 220px;
                height: 295px;
            }
            .polaroid-caption {
                width: 220px;
                font-size: 0.85rem;
            }
            .black-text {
                font-size: 1rem;
            }
            .content {
                padding: 1.2rem 1rem 1.8rem 1rem;  /* увеличено: сверху 1.2rem, снизу 1.8rem */
            }
        }
    </style>
</head>
<body>
    <div id="hearts-container"></div>
    <div class="content">
        <div class="main-title">💗 Соединяя два торта и два времени 💗</div>

        <div class="polaroid">
            <div class="photo-container">
                <img src="love.jpg" alt="Наше фото">
            </div>
            <div class="polaroid-caption">
                Зеркало не врёт:<br>хороший мальчик вырос в отличного мужчину
            </div>
        </div>

        <div class="black-text">Хочу поздравить вас обоих: того, кто задувает свечи, и того, кто в них верит</div>

        <button class="next-btn" id="nextButton">Далее →</button>
    </div>

    <script>
        function createHearts() {
            const container = document.getElementById('hearts-container');
            const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '♥️'];
            const heartCount = 45;
            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                const size = 0.8 + Math.random() * 1.4;
                heart.style.fontSize = size + 'rem';
                const sectorWidth = 100 / heartCount;
                const leftBase = i * sectorWidth;
                const offset = Math.random() * sectorWidth;
                let left = leftBase + offset;
                if (left > 100) left = 100;
                heart.style.left = left + '%';
                const duration = 8 + Math.random() * 12;
                heart.style.animationDuration = duration + 's';
                heart.style.animationDelay = (Math.random() * 8) + 's';
                container.appendChild(heart);
            }
        }
        window.addEventListener('DOMContentLoaded', createHearts);

        const nextBtn = document.getElementById('nextButton');
        nextBtn.addEventListener('click', function() {
            window.location.href = 'page5.html';
        });
    </script>
</body>
</html>
